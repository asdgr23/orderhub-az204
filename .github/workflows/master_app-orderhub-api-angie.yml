# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install ALL dependencies
        working-directory: ./src/api
        run: npm ci

      - name: Build app
        working-directory: ./src/api
        run: npm run build

      - name: Install ONLY production dependencies
        working-directory: ./src/api
        run: npm ci --omit=dev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            src/api/dist
            src/api/package.json
            src/api/package-lock.json
            src/api/node_modules

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging        # opcional, permite aprobación manual en GitHub
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-orderhub-api-angie'
          slot-name: 'staging'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_dqlTGbuGwa7EimtAhuaEqnB1c9fm0DzMhfpejNhjEGyZdGJ0nhrJjJuyLhc7 }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging       # <-- espera que staging termine OK
    environment: production     # opcional, permite aprobación manual en GitHub
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Production
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-orderhub-api-angie'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B60ADBC6051D423A9FAFEE269A8C7D81 }}